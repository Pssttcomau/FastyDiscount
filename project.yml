name: FastyDiscount
options:
  bundleIdPrefix: com.fastydiscount
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:

  # ── Main iOS App ──────────────────────────────────────────
  FastyDiscount:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscount
        excludes:
          - "**/.gitkeep"
    resources:
      - path: FastyDiscount/Resources/Assets.xcassets
      - path: FastyDiscount/Resources/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app
        INFOPLIST_FILE: FastyDiscount/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FastyDiscount/FastyDiscount.entitlements
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FastyDiscount
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTS_MACCATALYST: false
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: FastyDiscount/FastyDiscount.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fastydiscount.shared
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.fastydiscount.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - target: FastyDiscountWidget
        embed: true
      - target: FastyDiscountShareExtension
        embed: true

  # ── watchOS App ───────────────────────────────────────────
  FastyDiscountWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscountWatch
        excludes:
          - "**/.gitkeep"
    resources:
      - path: FastyDiscountWatch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app.watchkitapp
        CODE_SIGN_ENTITLEMENTS: FastyDiscountWatch/FastyDiscountWatch.entitlements
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.fastydiscount.app
        INFOPLIST_KEY_CFBundleDisplayName: FastyDiscount
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: FastyDiscountWatch/FastyDiscountWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fastydiscount.shared

  # ── WidgetKit Extension ───────────────────────────────────
  FastyDiscountWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscountWidget
        excludes:
          - "**/.gitkeep"
      - path: FastyDiscount/Core/Services
        excludes:
          - "**/.gitkeep"
          - "AuthenticationService.swift"
          - "MockAuthenticationService.swift"
      - path: FastyDiscount/App/AppConstants.swift
    resources:
      - path: FastyDiscountWidget/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app.widget
        CODE_SIGN_ENTITLEMENTS: FastyDiscountWidget/FastyDiscountWidget.entitlements
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FastyDiscount Widget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: FastyDiscountWidget/FastyDiscountWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fastydiscount.shared

  # ── Share Extension ───────────────────────────────────────
  FastyDiscountShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscountShareExtension
        excludes:
          - "**/.gitkeep"
          - Info.plist
      - path: FastyDiscount/Core/Services
        excludes:
          - "**/.gitkeep"
          - "AuthenticationService.swift"
          - "MockAuthenticationService.swift"
      - path: FastyDiscount/App/AppConstants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app.share-extension
        INFOPLIST_FILE: FastyDiscountShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FastyDiscountShareExtension/FastyDiscountShareExtension.entitlements
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: FastyDiscountShareExtension/FastyDiscountShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fastydiscount.shared

  # ── Unit Tests ────────────────────────────────────────────
  FastyDiscountTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscountTests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app.tests
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: FastyDiscount
        embed: false

  # ── UI Tests ──────────────────────────────────────────────
  FastyDiscountUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FastyDiscountUITests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastydiscount.app.uitests
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: FastyDiscount
        embed: false

schemes:
  FastyDiscount:
    build:
      targets:
        FastyDiscount: all
        FastyDiscountTests: [test]
        FastyDiscountUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FastyDiscountTests
        - FastyDiscountUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FastyDiscountWatch:
    build:
      targets:
        FastyDiscountWatch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
